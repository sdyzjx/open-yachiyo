active_provider: qwen35_plus
providers:
  qwen35_plus:
    type: openai_compatible
    display_name: Qwen 3.5 Plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3.5-plus
    # api_key is intentionally omitted; use DASHSCOPE_API_KEY env var
    api_key_env: DASHSCOPE_API_KEY
    timeout_ms: 20000
  openai:
    type: openai_compatible
    display_name: OpenAI
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    timeout_ms: 20000
  qwen3_tts:
    type: tts_dashscope
    tts_model: qwen3-tts-instruct-flash
    tts_voice: Cherry
    tts_instructions: 请用更慢的语速、更冷淡的语气、更平直的句调朗读，压低情绪起伏，减少温柔感和陪伴感，像疏离、克制、低温度的冷静播报，不要显得亲近。
    tts_optimize_instructions: true
    # Optional realtime defaults for desktop-live2d realtime transport.
    tts_realtime_model: qwen3-tts-instruct-flash-realtime
    tts_realtime_voice: Cherry
    tts_realtime_instructions: 请用更慢的语速、更冷淡的语气、更平直的句调朗读，压低情绪起伏，减少温柔感和陪伴感，像疏离、克制、低温度的冷静播报，不要显得亲近。
    tts_realtime_optimize_instructions: true
    base_url: https://dashscope.aliyuncs.com/api/v1
    api_key_env: DASHSCOPE_API_KEY
